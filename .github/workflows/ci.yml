name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format
        run: ruff format --check .
      - name: mypy
        run: mypy redistail || true  # advisory until type hints mature

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
        redis: ["6", "7"]
    services:
      redis:
        image: redis:${{ matrix.redis }}
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Integration tests honor this URL and skip launching testcontainers.
      REDISTAIL_TEST_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Configure Redis for keyspace notifications
        run: |
          sudo apt-get update && sudo apt-get install -y redis-tools
          redis-cli -h localhost CONFIG SET notify-keyspace-events AKE
          redis-cli -h localhost CONFIG GET notify-keyspace-events
      - name: Unit tests
        run: pytest -m "not integration" --cov=redistail --cov-report=term-missing
      - name: Integration tests
        run: pytest -m integration -v
